name: Gradle Build (sensor-data-bridge + cayenne)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle*', '**/settings.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build --stacktrace
      - name: Run tests
        run: ./gradlew test --stacktrace
      - name: Assemble distribution (sensor-data-bridge)
        run: ./gradlew :sensor-data-bridge:assemble --stacktrace
      - name: List build outputs
        run: |
          echo "Root build/libs:"
          ls -lh build/libs || true
          echo "sensor-data-bridge/build/libs:"
          ls -lh sensor-data-bridge/build/libs || true
          echo "cayenne/build/libs:"
          ls -lh cayenne/build/libs || true
