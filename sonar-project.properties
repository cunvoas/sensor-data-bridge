# SonarQube Configuration for sensor-atmo project
# ================================================
# This file contains SonarQube configuration complementary to pom.xml
# Server configuration (host.url, organization, projectKey) is in pom.xml
# Run with: mvn clean compile sonar:sonar -Psonar -Dsonar.token=YOUR_TOKEN

# Authentication
# ==============
# Token must be provided via command line: -Dsonar.token=your_token_here
# Generate from SonarQube UI: Administration ? Security ? Users ? Tokens

# Project Information
# ===================
sonar.projectName=sensor-data-bridge
sonar.projectVersion=1.0.0-SNAPSHOT
sonar.sourceEncoding=UTF-8

# Java Configuration
# ==================
sonar.language=java
sonar.java.source=21
sonar.java.target=21
sonar.java.binaries=target/classes,cayenne/target/classes,sensor-data-bridge/target/classes
sonar.java.test.binaries=target/test-classes,cayenne/target/test-classes,sensor-data-bridge/target/test-classes
sonar.java.libraries=target/dependency/*.jar,cayenne/target/dependency/*.jar,sensor-data-bridge/target/dependency/*.jar
sonar.java.test.libraries=target/dependency/*.jar,cayenne/target/dependency/*.jar,sensor-data-bridge/target/dependency/*.jar

# Code Coverage Configuration
# ============================
sonar.java.coveragePlugin=jacoco
sonar.dynamicAnalysis=reuseReports
sonar.jacoco.reportPath=target/jacoco.exec
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,cayenne/target/site/jacoco/jacoco.xml,sensor-data-bridge/target/site/jacoco/jacoco.xml

# Test Reports
# ============
sonar.junit.reportPaths=target/surefire-reports,cayenne/target/surefire-reports,sensor-data-bridge/target/surefire-reports

# Static Analysis Tools Integration
# ==================================
sonar.java.checkstyle.reportPaths=target/checkstyle-result.xml,cayenne/target/checkstyle-result.xml,sensor-data-bridge/target/checkstyle-result.xml
sonar.java.pmd.reportPaths=target/pmd.xml,cayenne/target/pmd.xml,sensor-data-bridge/target/pmd.xml
sonar.java.spotbugs.reportPaths=target/spotbugsXml.xml,cayenne/target/spotbugsXml.xml,sensor-data-bridge/target/spotbugsXml.xml

# Global Exclusions
# =================
# Exclude auto-generated code and system directories
sonar.exclusions=\
    **/target/**,\
    **/generated/**,\
    **/generated-sources/**,\
    **/generated-test-sources/**,\
    **/build/**,\
    **/.gradle/**,\
    **/node_modules/**,\
    **/*.min.js,\
    **/*.min.css,\
    **/vendor/**,\
    **/third-party/**

# Coverage Exclusions
# ===================
# Exclude test classes and configuration from coverage analysis
sonar.coverage.exclusions=\
    **/test/**,\
    **/tests/**,\
    **/*Test.java,\
    **/*Tests.java,\
    **/*TestCase.java,\
    **/*IT.java,\
    **/*Spec.java,\
    **/config/**,\
    **/configuration/**,\
    **/Application.java,\
    **/*Application.java,\
    **/*Config.java,\
    **/*Configuration.java,\
    **/dto/**,\
    **/entity/**,\
    **/model/**,\
    **/*DTO.java,\
    **/*Entity.java,\
    **/*Model.java,\
    **/exception/**,\
    **/*Exception.java

# Code Duplication Exclusions
# ============================
# Exclude generated files and boilerplate code from duplication analysis
sonar.cpd.exclusions=\
    **/generated/**,\
    **/dto/**,\
    **/entity/**,\
    **/model/**,\
    **/*DTO.java,\
    **/*Entity.java,\
    **/*Model.java,\
    **/config/**,\
    **/*Config.java,\
    **/*Configuration.java

# Quality Rules Configuration
# ============================
# Additional quality gate settings can be configured here
# Example:
# sonar.qualitygate.wait=true
# sonar.coverage.line.minimum=80
# sonar.coverage.branch.minimum=70