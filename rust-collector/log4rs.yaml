refresh_rate: 30 seconds
appenders:
  stdout:
    kind: console
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S)} {h({l})} [{M}] {m}{n}"

  file:
    kind: rolling_file
    path: "/var/log/rust-collector.log"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 10 mb
      roller:
        kind: fixed_window
        pattern: "/var/log/rust-collector.{}.log"
        base: 1
        count: 5
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S)} {l} [{M}] {m}{n}"

root:
  level: info
  appenders:
    - stdout
    - file

loggers:
  rust_collector:
    level: debug
    appenders:
      - stdout
      - file
    additive: false
