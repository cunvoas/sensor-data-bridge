# SonarQube/SonarCloud configuration for rust-collector
sonar.projectKey=rust-collector
sonar.projectName=rust-collector
sonar.sources=src
sonar.language=rust
sonar.host.url=http://localhost:9000
# Replace with your SonarQube token or set SONAR_TOKEN env var
sonar.login=__REPLACE_WITH_YOUR_TOKEN__
# Optional: coverage report if you use tarpaulin
sonar.coverageReportPaths=tarpaulin-report.lcov
